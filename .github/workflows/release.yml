name: Build release APK

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Configure release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "UPLOAD_KEYSTORE_BASE64 secret is required for signed releases."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > upload-keystore.jks
          printf '%s\n' \
            "storeFile=upload-keystore.jks" \
            "storePassword=${KEYSTORE_PASSWORD}" \
            "keyAlias=${KEY_ALIAS}" \
            "keyPassword=${KEY_PASSWORD}" \
            > keystore.properties

      - name: Build release APK and AAB
        run: chmod +x gradlew && ./gradlew :wear:assembleRelease :wear:bundleRelease --no-daemon

      - name: Prepare release artifacts
        run: |
          cp wear/build/outputs/apk/release/wear-release.apk calendar2alarm-wear.apk
          cp wear/build/outputs/bundle/release/wear-release.aab calendar2alarm-wear.aab

      - name: Verify upload key signature
        run: |
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          EXPECTED="0c3dd43eba4cf6315ea904fe7335d1eafd7047260eba3af9fd67df0081c0cd82"
          actual=$("$APKSIGNER" verify --print-certs calendar2alarm-wear.apk 2>&1 | grep -m1 "SHA-256 digest:" | sed 's/.*SHA-256 digest: //' | tr -d ':' | tr '[:upper:]' '[:lower:]')
          if [ "$actual" != "$EXPECTED" ]; then
            echo "Wrong signing key: $actual (expected $EXPECTED)"
            exit 1
          fi
          echo "calendar2alarm-wear.apk signed with upload key"

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            calendar2alarm-wear.apk
            calendar2alarm-wear.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: calendar2alarm-wear
          path: |
            calendar2alarm-wear.apk
            calendar2alarm-wear.aab
